<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ICD-10 Finder — 選項</title>
    <style>
      body {
        font:
          14px/1.5 -apple-system,
          system-ui,
          sans-serif;
        max-width: 520px;
        margin: 32px auto;
        padding: 0 16px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 18px;
      }
      .opt {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 12px 0;
        border-top: 1px solid #eee;
      }
      .opt label {
        font-weight: 600;
      }
      .hint {
        color: #666;
        font-size: 13px;
        margin-top: 2px;
      }
      code {
        background: #f3f3f3;
        padding: 1px 4px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>ICD-10 Finder</h1>
    <p class="hint">
      在任何網頁上反白病名或關鍵字,即可取得推薦的 ICD-10-CM
      代碼。所有搜尋預設<strong>離線</strong>在你的電腦上執行。
    </p>

    <div class="opt">
      <input type="checkbox" id="autoPopup" />
      <div>
        <label for="autoPopup">反白時自動彈出懸浮視窗</label>
        <div class="hint">反白文字時自動顯示結果卡片。關閉後,改用右鍵選單「查 ICD-10」來查詢。</div>
      </div>
    </div>

    <div class="opt">
      <input type="checkbox" id="onlineEnhance" />
      <div>
        <label for="onlineEnhance">線上增強(NLM)</label>
        <div class="hint">
          額外查詢 NLM Clinical Table Search Service 取得最新比對結果。這會把反白文字送到
          <code>clinicaltables.nlm.nih.gov</code>。預設關閉 —— 處理病人資料時請保持關閉。
        </div>
      </div>
    </div>

    <p class="hint" id="status"></p>
    <script src="options.js"></script>
  </body>
</html>
